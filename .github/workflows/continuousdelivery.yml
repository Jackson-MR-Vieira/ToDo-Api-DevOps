name: CD - ToDo API

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Criar arquivo zip do projeto
        run: |
          zip -r todo-api.zip .

      - name: Upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: todo-api-build
          path: todo-api.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download do artefato
        uses: actions/download-artifact@v4
        with:
          name: todo-api-build

      - name: Extrair arquivo zip
        run: |
          unzip todo-api.zip

      - name: Simular deploy
        run: |
          echo "Aplicação ToDo API publicada com sucesso"
          

  docker:
    runs-on: ubuntu-latest
    steps:
      # Setup do Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build da imagem Docker
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: todo-api:latest